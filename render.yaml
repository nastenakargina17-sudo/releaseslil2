services:
  - type: web
    name: release-digest-mvp
    env: python
    plan: starter
    buildCommand: |
      python -m venv .venv
      .venv/bin/pip install -r requirements.txt
    startCommand: .venv/bin/uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TRACKER_API_BASE_URL
        sync: false
      - key: TRACKER_API_TOKEN
        sync: false
      - key: TRACKER_ORG_ID
        sync: false
      - key: CONFLUENCE_API_BASE_URL
        sync: false
      - key: CONFLUENCE_API_TOKEN
        sync: false
      - key: CONFLUENCE_RELEASE_SCHEDULE_PAGE_ID
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: SESSION_HTTPS_ONLY
        sync: false
      - key: YANDEX_CLIENT_ID
        sync: false
      - key: YANDEX_CLIENT_SECRET
        sync: false
      - key: YANDEX_REDIRECT_URI
        sync: false
      - key: YANDEX_ALLOWED_EMAILS
        sync: false
